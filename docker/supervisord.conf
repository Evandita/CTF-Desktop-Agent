[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=Xvfb :1 -screen 0 %(ENV_SCREEN_WIDTH)sx%(ENV_SCREEN_HEIGHT)sx%(ENV_SCREEN_DEPTH)s
autorestart=true
priority=10

[program:xfce4]
command=startxfce4
environment=DISPLAY=":1",HOME="/home/ctfuser"
user=ctfuser
autorestart=true
priority=20

[program:x11vnc]
command=x11vnc -display :1 -forever -nopw -shared -rfbport 5900
autorestart=true
priority=30

[program:novnc]
command=websockify --web /usr/share/novnc 6080 localhost:5900
autorestart=true
priority=40

[program:container_api]
command=/opt/container_api/venv/bin/uvicorn server:app --host 0.0.0.0 --port 8888
directory=/opt/container_api
environment=DISPLAY=":1"
autorestart=true
priority=50
